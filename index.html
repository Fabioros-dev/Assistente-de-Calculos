<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente de calculos </title>
    <style>
        /* Estética escura com tons pastéis */
        :root {
            --bg-color: #121214;
            --card-bg: #202024;
            --text-light: #E1E1E6;
            --pastel-purple: #B4B5FF;
            --pastel-pink: #FFB4E6;
            --pastel-blue: #B4E6FF;
            --btn-hover: #323238;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border-top: 4px solid var(--pastel-purple);
        }

        h1, h2 {
            color: var(--pastel-purple);
            margin-bottom: 20px;
        }

        .menu-btn {
            background-color: transparent;
            color: var(--text-light);
            border: 2px solid var(--pastel-blue);
            padding: 12px 20px;
            margin: 10px 0;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background-color: var(--btn-hover);
            border-color: var(--pastel-pink);
            transform: translateY(-2px);
        }

        .section {
            display: none;
            text-align: left;
        }

        .active {
            display: block;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            color: var(--pastel-blue);
        }

        input, select {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-color);
            border: 1px solid #323238;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .action-btn {
            background-color: var(--pastel-purple);
            color: var(--bg-color);
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 6px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover {
            background-color: var(--pastel-pink);
        }

        .back-btn {
            background-color: transparent;
            color: #8D8D99;
            border: none;
            margin-top: 20px;
            cursor: pointer;
            text-decoration: underline;
            width: 100%;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--bg-color);
            border-left: 4px solid var(--pastel-pink);
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menu" class="section active">
        <h1>[ Assistente de calculos ]</h1>
        <p>Olá! Selecione a opção desejada:</p>
        <button class="menu-btn" onclick="showSection('calc')">Calculadora</button>
        <button class="menu-btn" onclick="showSection('medidas')">Medidas e Áreas</button>
        <button class="menu-btn" onclick="showSection('comissao')">Calcular Comissão</button>
    </div>

    <div id="calc" class="section">
        <h2>Calculadora</h2>
        <label>Operação:</label>
        <select id="calcOp">
            <option value="+">Soma</option>
            <option value="-">Subtração</option>
            <option value="*">Multiplicação</option>
            <option value="/">Divisão</option>
        </select>
        <label>Primeiro número:</label>
        <input type="number" id="calcN1">
        <label>Segundo número:</label>
        <input type="number" id="calcN2">
        <button class="action-btn" onclick="calcular()">Calcular</button>
        <div id="resCalc" class="result-box"></div>
        <button class="back-btn" onclick="showSection('menu')">Voltar ao Menu</button>
    </div>

    <div id="medidas" class="section">
        <h2>Medidas e Áreas</h2>
        <label>Tipo de Conversão:</label>
        <select id="medOp">
            <option value="pol-mm">Polegada para Milímetro</option>
            <option value="mm-pol">Milímetro para Polegada</option>
            <option value="pol-cm">Polegada para Centímetro</option>
            <option value="cm-pol">Centímetro para Polegada</option>
            <option value="area-m2">Calcular Metro Quadrado (Largura x Comprimento)</option>
        </select>
        <div id="inputMedidas">
            <label id="lblMedida1">Valor:</label>
            <input type="number" id="medValor1">
            <div id="medida2Div" style="display:none;">
                <label>Comprimento:</label>
                <input type="number" id="medValor2">
            </div>
        </div>
        <button class="action-btn" onclick="converterMedidas()">Converter</button>
        <div id="resMed" class="result-box"></div>
        <button class="back-btn" onclick="showSection('menu')">Voltar ao Menu</button>
    </div>

    <div id="comissao" class="section">
        <h2>Painel de Vendas</h2>
        <p>Meta Fixa: R$ 100.000,00</p>
        <label>O que deseja fazer?</label>
        <select id="comOp" onchange="toggleComissaoInputs()">
            <option value="meta">Consultar Valor por Dia</option>
            <option value="comissao">Consultar Comissão Atual</option>
        </select>
        
        <label>Total Vendido até agora:</label>
        <input type="number" id="vendasTotal" placeholder="Ex: 50000">

        <div id="diaDiv">
            <label>Dias no Mês (Ex: 31):</label>
            <input type="number" id="diasMes" value="31">
            <label>Dia de Hoje:</label>
            <input type="number" id="diaHoje" placeholder="Ex: 15">
        </div>

        <button class="action-btn" onclick="calcularComissao()">Verificar</button>
        <div id="resCom" class="result-box"></div>
        <button class="back-btn" onclick="showSection('menu')">Voltar ao Menu</button>
    </div>
</div>

<script>
    // Navegação entre as telas
    function showSection(id) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.result-box').forEach(box => box.style.display = 'none');
    }

    function exibirResultado(idElemento, texto) {
        const box = document.getElementById(idElemento);
        box.innerText = texto;
        box.style.display = 'block';
    }

    // Lógica da Calculadora
    function calcular() {
        let n1 = parseFloat(document.getElementById('calcN1').value);
        let n2 = parseFloat(document.getElementById('calcN2').value);
        let op = document.getElementById('calcOp').value;
        let res = 0;

        if (isNaN(n1) || isNaN(n2)) return alert("Preencha ambos os números.");

        if (op === '+') res = n1 + n2;
        else if (op === '-') res = n1 - n2;
        else if (op === '*') res = n1 * n2;
        else if (op === '/') {
            if (n2 === 0) return exibirResultado('resCalc', "Não é possível dividir por zero.");
            res = n1 / n2;
        }
        exibirResultado('resCalc', `Resultado: ${n1} ${op} ${n2} = ${res.toFixed(2)}`);
    }

    // Mudança de inputs na área de Medidas
    document.getElementById('medOp').addEventListener('change', function() {
        if(this.value === 'area-m2') {
            document.getElementById('lblMedida1').innerText = "Largura (m):";
            document.getElementById('medida2Div').style.display = "block";
        } else {
            document.getElementById('lblMedida1').innerText = "Valor:";
            document.getElementById('medida2Div').style.display = "none";
        }
    });

    // Lógica de Medidas
    function converterMedidas() {
        let op = document.getElementById('medOp').value;
        let v1 = parseFloat(document.getElementById('medValor1').value);
        let v2 = parseFloat(document.getElementById('medValor2').value);

        if (isNaN(v1)) return alert("Preencha o valor.");

        let res = "";
        switch(op) {
            case 'pol-mm': res = `Conversão: ${(v1 * 25.4).toFixed(2)} mm`; break;
            case 'mm-pol': res = `Conversão: ${(v1 / 25.4).toFixed(4)} polegadas`; break;
            case 'pol-cm': res = `Conversão: ${(v1 * 2.54).toFixed(2)} cm`; break;
            case 'cm-pol': res = `Conversão: ${(v1 / 2.54).toFixed(4)} polegadas`; break;
            case 'area-m2': 
                if (isNaN(v2)) return alert("Preencha o comprimento.");
                res = `Área total: ${(v1 * v2).toFixed(2)} m²`; 
                break;
        }
        exibirResultado('resMed', res);
    }

    // Lógica da Comissão
    function toggleComissaoInputs() {
        let op = document.getElementById('comOp').value;
        document.getElementById('diaDiv').style.display = op === 'meta' ? 'block' : 'none';
    }

    function calcularComissao() {
        let op = document.getElementById('comOp').value;
        let vendido = parseFloat(document.getElementById('vendasTotal').value);
        let meta = 100000;

        if (isNaN(vendido)) return alert("Preencha o valor vendido.");

        if (op === 'meta') {
            let diasMes = parseInt(document.getElementById('diasMes').value);
            let diaHoje = parseInt(document.getElementById('diaHoje').value);
            
            if (isNaN(diasMes) || isNaN(diaHoje) || diaHoje >= diasMes) {
                return alert("Preencha os dias corretamente.");
            }

            let diasRestantes = diasMes - diaHoje;
            let faltante = meta - vendido;
            
            if (faltante <= 0) {
                exibirResultado('resCom', "Parabéns! Meta atingida.");
            } else {
                let valorPorDia = faltante / diasRestantes;
                exibirResultado('resCom', `Falta vender: R$ ${faltante.toFixed(2)}\nValor a vender por dia: R$ ${valorPorDia.toFixed(2)}`);
            }
        } else if (op === 'comissao') {
            // Comissão de 0.35% baseada no seu código Java
            let comissao = vendido * 0.0035;
            exibirResultado('resCom', `Sua comissão atual é de: R$ ${comissao.toFixed(2)}`);
        }
    }
</script>

</body>
</html>
